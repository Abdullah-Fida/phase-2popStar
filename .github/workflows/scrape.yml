name: ProperStar Scraper Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of listings to scrape'
        required: true
        default: '50'
      workers:
        description: 'Number of workers (Safe max: 4 for CI)'
        required: true
        default: '4'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Scraper
      # Use manual inputs or defaults
      run: |
        python phase3_scrape.py --limit ${{ github.event.inputs.limit || '50' }} --workers ${{ github.event.inputs.workers || '4' }}

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: scraped-data
        path: |
          output/Objekte.csv
          output/Kontakte.csv
          output/phase3_scrape.log
          output/phase3_rejected.csv
