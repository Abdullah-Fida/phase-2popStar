name: ProperStar Scraper Pipeline

on:
  workflow_dispatch:
    inputs:
      phase1_limit:
        description: 'Limit Phase 1 URLs to collect per mode (0 for ALL)'
        required: true
        default: '50'
      phase3_limit:
        description: 'Limit Phase 3 URLs to scrape (0 for ALL)'
        required: true
        default: '100'
      workers:
        description: 'Number of workers (Warning: >4 may cause crashes on standard GitHub nodes)'
        required: true
        default: '8'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max allowed by GitHub Actions (6 hours)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ensure output directory exists
      run: mkdir -p output

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pandas httpx

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Phase 1 (URL Discovery)
      run: python phase1_scraper.py --limit ${{ github.event.inputs.phase1_limit }} --concurrency 4

    - name: Run Phase 2 (Availability Check)
      run: python phase2_check.py

    - name: Run Phase 3 (Detailed Scraping)
      run: python phase3_scrape.py --limit ${{ github.event.inputs.phase3_limit }} --workers ${{ github.event.inputs.workers }}

    - name: Run Phase 3.7 (Agency Cleanup)
      run: python phase3_7_cleanup.py

    - name: Run Phase 3.8 (Contact Deduplication)
      run: python phase3_8_deduplicate.py

    - name: Run Phase 5 (API Advertiser Check)
      run: python phase5_api_check.py

    - name: Run Phase 6 (Categorization)
      run: python phase6_categorize.py

    - name: Upload Complete Output Directory
      if: always() # Ensure uploads even if a step crashes or times out!
      uses: actions/upload-artifact@v4
      with:
        name: properstar-output-data
        path: output/
