name: ProperStar Part C - Finish and Formatting
on:
  workflow_dispatch:
  schedule:
    - cron: '07 18 * * *' # Runs at 18:07 UTC daily (12 hours after part A)

jobs:
  scrape_phase_3_finish:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Usually only needs 1-2 hours max

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ensure output directory exists
      run: mkdir -p output

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx supabase aiohttp

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Download all Supabase data to CSV (for ID initialization)
      env:
        SUPABASE_URL: https://awesbiwvmehnlopbhmya.supabase.co
        SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZXNiaXd2bWVobmxvcGJobXlhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODQxNTc2NywiZXhwIjoyMDkzOTkxNzY3fQ.enWFYD4-z1GQ9Lj1PXZYBeC5wda3a3VdWjB-nWmw1sI
      run: python -c "import supabase_helper; supabase_helper.download_to_csv()"

    - name: Run Phase 3 (Continue Scrape & Save to Supabase LIVE)
      env:
        SUPABASE_URL: https://awesbiwvmehnlopbhmya.supabase.co
        SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZXNiaXd2bWVobmxvcGJobXlhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODQxNTc2NywiZXhwIjoyMDkzOTkxNzY3fQ.enWFYD4-z1GQ9Lj1PXZYBeC5wda3a3VdWjB-nWmw1sI
      run: python phase3_scrape.py --workers 8 --supabase

    - name: Run Phase 3.7 (Agency Cleanup)
      run: python phase3_7_cleanup.py

    - name: Run Phase 3.8 (Contact Deduplication)
      run: python phase3_8_deduplicate.py

    - name: Run Phase 5 (API Advertiser Check)
      run: python phase5_api_check.py

    - name: Run Phase 6 (Categorization)
      run: python phase6_categorize.py

    - name: Run Phase 7 (Save State & Clear DB)
      env:
        SUPABASE_URL: https://awesbiwvmehnlopbhmya.supabase.co
        SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZXNiaXd2bWVobmxvcGJobXlhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODQxNTc2NywiZXhwIjoyMDkzOTkxNzY3fQ.enWFYD4-z1GQ9Lj1PXZYBeC5wda3a3VdWjB-nWmw1sI
      run: python phase7_reset.py

    - name: Upload Final Complete Data
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: properstar-final-data
        path: output/
