name: ProperStar Part B - Scrape Main
on:
  workflow_dispatch:
  schedule:
    - cron: '2 21 * * *' # 2:02 AM PKT (UTC+5) daily — 4 hours after Part A

jobs:
  scrape_phase_3_run_1:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max allowed by GitHub Actions (6 hours)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ensure output directory exists
      run: mkdir -p output

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Phase 3 (Scrape & Save to Supabase LIVE)
      env:
        SUPABASE_URL: https://awesbiwvmehnlopbhmya.supabase.co
        SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZXNiaXd2bWVobmxvcGJobXlhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODQxNTc2NywiZXhwIjoyMDkzOTkxNzY3fQ.enWFYD4-z1GQ9Lj1PXZYBeC5wda3a3VdWjB-nWmw1sI
      # Will scrape as many pending URLs as possible within 6 hours, saving live to Supabase
      run: python phase3_scrape.py --workers 8 --supabase

    - name: Upload Interstitial Log Backup
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: properstar-phase3-log-run1
        path: output/
