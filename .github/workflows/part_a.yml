name: ProperStar Part A - Discovery
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Runs at Midnight UTC on Mondays

jobs:
  scrape_phase_1_2:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx supabase

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Phase 1 (URL Discovery)
      run: python phase1_scraper.py --concurrency 4

    - name: Run Phase 2 (Availability Check & Upload to Supabase)
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python phase2_check.py --supabase

    - name: Upload Output Backup (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: properstar-urls-backup
        path: output/
