name: ProperStar Part A - Discovery
on:
  workflow_dispatch:
  schedule:
    - cron: '49 07 * * *' # Runs at 07:49 UTC daily (12:49 PM local)

jobs:
  scrape_phase_1_2:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # Max allowed by GitHub Actions (6 hours)

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Ensure output directory exists
      run: mkdir -p output

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install httpx supabase

    - name: Install Playwright Browsers
      run: playwright install chromium

    - name: Run Phase 1 (URL Discovery)
      run: python phase1_scraper.py --concurrency 4

    - name: Run Phase 2 (Availability Check & Upload to Supabase)
      env:
        SUPABASE_URL: https://awesbiwvmehnlopbhmya.supabase.co
        SUPABASE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3ZXNiaXd2bWVobmxvcGJobXlhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3ODQxNTc2NywiZXhwIjoyMDkzOTkxNzY3fQ.enWFYD4-z1GQ9Lj1PXZYBeC5wda3a3VdWjB-nWmw1sI
      run: python phase2_check.py --supabase

    - name: Upload Output Backup (Optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: properstar-urls-backup
        path: output/
